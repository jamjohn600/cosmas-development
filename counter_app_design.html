<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter App</title>

    <style>
      /* ── Base reset ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── Color tokens (light mode) ── */
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f5f5f3;
        --bg-info: #e6f1fb;

        --text-primary: #1a1a19;
        --text-secondary: #5f5e5a;
        --text-info: #185fa5;
        --text-danger: #a32d2d;

        --border-tertiary: rgba(0, 0, 0, 0.15);
        --border-secondary: rgba(0, 0, 0, 0.3);
        --border-info: rgba(24, 95, 165, 0.4);
        --border-danger: rgba(163, 45, 45, 0.4);

        --radius-md: 8px;
        --radius-lg: 12px;
      }

      /* ── Dark mode overrides ── */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-primary: #1e1e1c;
          --bg-secondary: #2a2a28;
          --bg-info: #0c447c;

          --text-primary: #f1efe8;
          --text-secondary: #b4b2a9;
          --text-info: #85b7eb;
          --text-danger: #f09595;

          --border-tertiary: rgba(255, 255, 255, 0.15);
          --border-secondary: rgba(255, 255, 255, 0.25);
          --border-info: rgba(133, 183, 235, 0.4);
          --border-danger: rgba(240, 149, 149, 0.4);
        }
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg-secondary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Card ── */
      .counter-card {
        max-width: 360px;
        width: 100%;
        background: var(--bg-primary);
        border: 0.5px solid var(--border-tertiary);
        border-radius: var(--radius-lg);
        padding: 2rem 1.5rem;
        text-align: center;
      }

      .counter-label {
        font-size: 13px;
        color: var(--text-secondary);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 1rem;
      }

      /* ── Display ── */
      .counter-display {
        font-size: 72px;
        font-weight: 500;
        color: var(--text-primary);
        line-height: 1;
        margin-bottom: 1.75rem;
        font-variant-numeric: tabular-nums;
      }
      .counter-display span {
        display: inline-block;
        min-width: 120px;
      }

      /* ── Controls ── */
      .counter-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 1.25rem;
      }

      .btn {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 0.5px solid var(--border-secondary);
        background: var(--bg-secondary);
        color: var(--text-primary);
        font-size: 22px;
        font-weight: 400;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        line-height: 1;
        transition: opacity 0.15s;
      }
      .btn:hover {
        opacity: 0.75;
      }
      .btn:active {
        transform: scale(0.96);
      }

      .btn-decrement {
        color: var(--text-danger);
        border-color: var(--border-danger);
      }
      .btn-increment {
        color: var(--text-info);
        border-color: var(--border-info);
      }

      /* ── Reset ── */
      .btn-reset {
        width: auto;
        height: 36px;
        border-radius: var(--radius-md);
        padding: 0 1.25rem;
        font-size: 13px;
        border: 0.5px solid var(--border-tertiary);
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn-reset:hover {
        opacity: 0.7;
      }

      /* ── Step pills ── */
      .counter-step-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 1rem;
      }

      .step-label {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .step-pills {
        display: flex;
        gap: 6px;
      }

      .step-pill {
        padding: 4px 12px;
        border-radius: var(--radius-md);
        font-size: 12px;
        border: 0.5px solid var(--border-tertiary);
        background: var(--bg-secondary);
        color: var(--text-secondary);
        cursor: pointer;
        user-select: none;
        transition: opacity 0.15s;
      }
      .step-pill:hover {
        opacity: 0.75;
      }
      .step-pill.active {
        background: var(--bg-info);
        color: var(--text-info);
        border-color: var(--border-info);
      }

      /* ── Accessibility ── */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      }
    </style>
  </head>
  <body>
    <h2 class="sr-only">
      Counter app with increment, decrement, and reset controls
    </h2>

    <div class="counter-card">
      <p class="counter-label">Counter</p>

      <div class="counter-display"><span id="count"></span></div>

      <div class="counter-controls">
        <button class="btn btn-decrement" aria-label="Decrement" onclick="decrement()">−</button>
        <button class="btn btn-increment" aria-label="Increment" onclick = "increment()">+</button>
      </div>

      <button class="btn-reset" onclick="reset()">Reset</button>

      <!-- <div class="counter-step-row">
        <span class="step-label">Step</span>
        <div class="step-pills">
          <div class="step-pill active">1</div> 
          <div class="step-pill">5</div>
          <div class="step-pill">10</div>
        </div>
      </div> -->
    </div>


    <script>
      let count = 0;
      
      let countDisplay = document.getElementById('count');
      countDisplay.innerHTML = count;

      function increment(){
        count += 1;
        countDisplay.innerHTML = count;
      }

      function decrement(){
        count -= 1;
        countDisplay.innerHTML = count;
      }

      function reset(){
        count = 0;
        countDisplay.innerHTML = count;
      }
    </script>
  </body>
</html>
